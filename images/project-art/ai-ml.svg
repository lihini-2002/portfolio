<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="aSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D8C4F0"/>
      <stop offset="1" stop-color="#FFB8D4"/>
    </linearGradient>
  </defs>
  <rect width="160" height="120" fill="url(#aSky)"/>
  <!-- floating sparkles -->
  <g fill="#FFFFFF">
    <rect x="20" y="18" width="4" height="4"/><rect x="136" y="24" width="4" height="4"/>
    <rect x="30" y="92" width="4" height="4"/><rect x="128" y="96" width="4" height="4"/>
  </g>
  <!-- robot head -->
  <rect x="58" y="20" width="6" height="10" fill="#7B4FA0"/>
  <rect x="56" y="14" width="10" height="8" fill="#FF4499"/>
  <rect x="40" y="30" width="80" height="60" fill="#4A2060"/>
  <rect x="44" y="34" width="72" height="52" fill="#E8D4F8"/>
  <!-- eyes -->
  <rect x="56" y="46" width="14" height="14" fill="#FFF0F8"/>
  <rect x="90" y="46" width="14" height="14" fill="#FFF0F8"/>
  <rect x="60" y="50" width="6" height="6" fill="#FF4499"/>
  <rect x="94" y="50" width="6" height="6" fill="#FF4499"/>
  <!-- smile -->
  <rect x="60" y="70" width="40" height="4" fill="#7B4FA0"/>
  <rect x="60" y="66" width="4" height="4" fill="#7B4FA0"/>
  <rect x="96" y="66" width="4" height="4" fill="#7B4FA0"/>
  <!-- neural nodes -->
  <g fill="#FF7BB8">
    <rect x="20" y="40" width="8" height="8"/><rect x="20" y="64" width="8" height="8"/>
    <rect x="132" y="40" width="8" height="8"/><rect x="132" y="64" width="8" height="8"/>
  </g>
  <g stroke="#FFFFFF" stroke-width="2">
    <line x1="28" y1="44" x2="40" y2="52"/><line x1="28" y1="68" x2="40" y2="60"/>
    <line x1="132" y1="44" x2="120" y2="52"/><line x1="132" y1="68" x2="120" y2="60"/>
  </g>
</svg>
