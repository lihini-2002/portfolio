<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none">

<defs>
  <style>
    .ol { stroke: #5A2B82; stroke-width: 6; stroke-linejoin: miter; stroke-linecap: square; }
    .thin { stroke: #5A2B82; stroke-width: 4; stroke-linejoin: miter; stroke-linecap: square; }
    .txt { fill: #FFF9FF; font-family: Arial, Helvetica, sans-serif; font-weight: 700; }
  </style>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="4" stdDeviation="2" flood-color="#d89adf" flood-opacity="0.5"/>
  </filter>
</defs>


<g filter="url(#shadow)">
